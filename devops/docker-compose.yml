x-db-env: &x-db-env
  POSTGRES_DB: "chat"
  POSTGRES_PASSWORD: "password"
  POSTGRES_USER: "user"
  PGDATA: "/var/lib/postgresql/data"

x-be-env: &x-be-env
  GOMAXPROCS: "1"
  # App
  APP_NAME: "chat"
  APP_VERSION: ${APP_VERSION:-1.0.0}
  # HTTP settings
  HTTP_PORT: "8080"
  # Logger
  LOG_LEVEL: "debug"
  # PG
  PG_POOL_MAX: "2"
  PG_URL: "postgres://user:password@db:5432/chat"
  # Metrics
  METRICS_ENABLED: "true"
  # Swagger
  SWAGGER_ENABLED: "true"
  # JWT
  JWT_ISSUER: "chat"
  JWT_SECRET: "2c8f82d1-373d-4ad4-a45b-34d5245affe6"
  JWT_EXPIRATION: "2400h"
  JWT_COOKIE_SECURE: "false"
  JWT_COOKIE_SAME_SITE: "Lax"
  # CORS
  CORS_ALLOW_ORIGINS: "http://fe.lvh.me,http://localhost:3000"
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_ALLOW_HEADERS: "Origin,Content-Type,Accept,Authorization"
  CORS_ALLOW_METHODS: "GET,POST,HEAD,PUT,DELETE,PATCH"

x-fe-env: &x-fe-env
  PUBLIC_APP_VERSION: ${APP_VERSION:-1.0.0}
  PUBLIC_FE_APP_URL: "http://fe.lvh.me"
  # PRIVATE
  BE_API_URL: "http://be.lvh.me/api/v1"

services:
  db:
    container_name: db
    image: postgres:latest
    restart: unless-stopped
    environment:
      <<: *x-db-env
    volumes:
      - chat_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    mem_limit: 256Mb
    cpus: 0.25
    networks:
      chat_network:
        aliases:
          - db.lvh.me

  be:
    container_name: be
    platform: linux/amd64
    build:
      context: ./../backend
    environment:
      <<: *x-be-env
    ports:
      - "8080:8080"
    depends_on:
      - db
    mem_limit: 512Mb
    cpus: 0.5
    networks:
      chat_network:
        aliases:
          - be.lvh.me

  fe:
    container_name: fe
    platform: linux/amd64
    build:
      context: ./../frontend
    environment:
      <<: *x-fe-env
    ports:
      - "3000:3000"
    mem_limit: 512Mb
    cpus: 0.5
    networks:
      chat_network:
        aliases:
          - fe.lvh.me

  nginx:
    container_name: nginx
    image: nginx:1.29.4-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - be
      - fe
    networks:
      chat_network:

networks:
  chat_network:
    external: true

volumes:
  chat_data:
    external: true
